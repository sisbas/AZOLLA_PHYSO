name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-hf
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize Git LFS in source repository
        run: |
          git lfs install
          git lfs pull

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python (using system Python to avoid Node.js 20 deprecation)
        run: |
          # Use system Python instead of setup-python action to avoid Node.js 20 warning
          python3 --version
          pip3 install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip3 install -r backend/requirements.txt

      - name: Deploy to Hugging Face Spaces via Git
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          # Extract username and space name from space_id
          SPACE_NAME=$(echo $HF_SPACE_ID | cut -d'/' -f2)
          
          # Configure git credentials to avoid password prompt
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://oauth2:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # Clone the Hugging Face Space with authenticated retry
          rm -rf hf_space

          HF_REPO_URL="https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"

          for attempt in 1 2 3 4 5; do
            git clone --depth 1 "$HF_REPO_URL" hf_space && break

            echo "Hugging Face clone failed. Attempt: $attempt"
            rm -rf hf_space

            if [ "$attempt" -eq 5 ]; then
              echo "ERROR: Hugging Face clone failed after retries."
              exit 1
            fi

            sleep $((attempt * 30))
          done

          # Initialize LFS in target clone
          cd hf_space
          git lfs install
          git lfs pull || true
          cd ..
          
          # Copy files to the Space (excluding .git folder)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='hf_space' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.log' \
            ./ hf_space/
          
          # Commit and push
          cd hf_space
          git add .

          # Guard checks: ensure LFS objects are present
          LFS_STATUS=$(git lfs status || true)
          echo "$LFS_STATUS"
          if echo "$LFS_STATUS" | grep -Eqi 'missing|not in local cache'; then
            echo "ERROR: Git LFS status indicates missing LFS objects. Failing before push to avoid remote rejection."
            exit 1
          fi

          git diff --cached --quiet || git commit -m "Deploy from GitHub: ${{ github.sha }}"
          git push "$HF_REPO_URL" main
