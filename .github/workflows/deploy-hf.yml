name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize Git LFS in source repository
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout

      - name: Verify LFS tracking rules
        run: |
          if ! grep -Eq '^(\*\.png|backend/tests/fixtures/regression_frame\.png)\s+filter=lfs' .gitattributes; then
            echo "ERROR: .gitattributes does not include LFS tracking for regression_frame.png (or *.png)."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        run: |
          python3 --version
          pip3 install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip3 install -r backend/requirements.txt

      - name: Deploy to Hugging Face Spaces via Git
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          # Configure git credentials
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global credential.helper store
          echo "https://oauth2:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          
          # Clone the Hugging Face Space
          rm -rf hf_space
          git clone https://huggingface.co/spaces/$HF_SPACE_ID hf_space

          # Initialize LFS in target clone
          cd hf_space
          git lfs install
          git lfs fetch --all || git lfs fetch origin main
          git lfs checkout
          cd ..
          
          # Copy files to the Space (excluding unnecessary folders)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='hf_space' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.log' \
            ./ hf_space/
          
          # Commit and push with LFS validation
          cd hf_space
          git add .

          # Guard: ensure regression fixture is LFS-tracked
          LFS_FILES=$(git lfs ls-files || true)
          echo "$LFS_FILES"
          if ! echo "$LFS_FILES" | grep -q 'backend/tests/fixtures/regression_frame\.png'; then
            echo "ERROR: backend/tests/fixtures/regression_frame.png is not LFS-tracked in deployment tree."
            exit 1
          fi

          # Guard: ensure no missing LFS objects
          LFS_STATUS=$(git lfs status || true)
          echo "$LFS_STATUS"
          if echo "$LFS_STATUS" | grep -Eqi 'missing|not in local cache'; then
            echo "ERROR: Git LFS status indicates missing LFS objects. Failing before push to avoid remote rejection."
            exit 1
          fi

          git diff --cached --quiet || git commit -m "Deploy from GitHub: ${{ github.sha }}"
          git push https://huggingface.co/spaces/$HF_SPACE_ID main
